name: Build Branch

on:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      verbose:
        description: "Enable verbose logging during tests"
        type: choice
        required: false
        default: "false"
        options:
          - "true"
          - "false"

permissions:
  contents: read
  actions: write
  pages: write
  id-token: write
  pull-requests: read

jobs:
  detect-open-pr:
    name: Detect Open PR
    runs-on: ubuntu-24.04
    outputs:
      should_run: ${{ steps.detect.outputs.should_run }}
    steps:
      - name: Detect Open PR For Branch
        id: detect
        uses: actions/github-script@v9
        with:
          script: |
            if (context.eventName !== "push") {
              core.setOutput("should_run", "true");
              return;
            }

            const branch = context.ref.replace("refs/heads/", "");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${branch}`,
            });

            core.setOutput("should_run", pulls.length === 0 ? "true" : "false");

  ci:
    name: Build
    needs: detect-open-pr
    if: ${{ needs.detect-open-pr.outputs.should_run == 'true' }}
    uses: ./.github/workflows/ci-reusable.yml
    secrets: inherit
    with:
      enable_deploy: ${{ github.repository_owner == 'momo5502' && github.ref == 'refs/heads/main' }}
      verbose: ${{ inputs.verbose || 'false' }}

  deploy-page:
    name: Deploy Page
    needs: [ci]
    if: ${{ github.repository_owner == 'momo5502' && github.ref == 'refs/heads/main' && needs.ci.result == 'success' }}
    runs-on: ubuntu-24.04
    # Serialize Pages deployments so two runs never deploy to the github-pages
    # environment at once (a common cause of "Deployment failed, try again later").
    # Don't cancel an in-progress deploy — let it finish rather than leaving Pages half-updated.
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    permissions:
      contents: read
      actions: read
      pages: write
      id-token: write
    steps:
      - name: Download Page Artifacts
        uses: pyTooling/download-artifact@v8
        with:
          name: Page Artifacts
          path: ./page/dist/
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ needs.ci.outputs.run_id }}

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./page/dist

      # GitHub Pages deployments intermittently fail with "Deployment failed, try
      # again later" from the Pages backend. Each attempt creates a fresh
      # deployment, so retry a couple of times before failing the job.
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy_attempt_1
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Wait before retry
        if: steps.deploy_attempt_1.outcome == 'failure'
        run: sleep 45

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy_attempt_2
        if: steps.deploy_attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Wait before retry
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        run: sleep 45

      - name: Deploy to GitHub Pages (final attempt)
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        uses: actions/deploy-pages@v5

  publish-python-package:
    name: Publish Python Package
    needs: [ci]
    if: ${{ github.repository_owner == 'momo5502' && github.ref == 'refs/heads/main' && needs.ci.result == 'success' }}
    runs-on: ubuntu-24.04
    # Serialize publishes so two runs never upload to PyPI at once (a concurrent
    # upload of the same version races and one attempt fails). Let an in-progress
    # publish finish rather than cancelling it mid-upload.
    concurrency:
      group: pypi-publish
      cancel-in-progress: false
    permissions:
      contents: read
      actions: read
      id-token: write
    steps:
      - name: Configure fast APT mirror
        uses: vegardit/fast-apt-mirror.sh@1.4.5
        with:
          exclude-current: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"
        env:
          PIP_NO_CACHE_DIR: 1

      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: sogen-wheel-*
          path: dist
          merge-multiple: true
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ needs.ci.outputs.run_id }}

      - name: Download sdist artifact
        uses: actions/download-artifact@v8
        with:
          name: sogen-sdist
          path: dist
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ needs.ci.outputs.run_id }}

      - name: Install auditwheel
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
          python -m pip install --upgrade auditwheel

      - name: Repair Linux wheels
        shell: bash
        run: |
          shopt -s nullglob
          repair_dir="${RUNNER_TEMP}/auditwheel-repaired"
          mkdir -p "$repair_dir"
          for whl in dist/*linux_x86_64.whl; do
            python -m auditwheel repair "$whl" -w "$repair_dir"
          done
          if compgen -G "$repair_dir/*.whl" > /dev/null; then
            rm -f dist/*linux_x86_64.whl
            mv "$repair_dir"/*.whl dist/
          fi

      - name: List distributions
        run: ls -la dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
