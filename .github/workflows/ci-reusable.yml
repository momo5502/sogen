name: Reusable Build

on:
  workflow_call:
    outputs:
      run_id:
        description: "Reusable workflow run id"
        value: ${{ jobs.workflow_metadata.outputs.run_id }}
    inputs:
      enable_deploy:
        required: false
        type: boolean
        default: false
      verbose:
        required: false
        type: string
        default: "false"

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow_metadata:
    name: Workflow Metadata
    runs-on: ubuntu-24.04
    outputs:
      run_id: ${{ steps.meta.outputs.run_id }}
    steps:
      - id: meta
        run: echo "run_id=${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

  clang-tidy:
    name: Run Clang Tidy
    env:
      LLVM_VERSION: 21
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - Windows
          - Linux
        include:
          - platform: Windows
            runner: windows-2025
            devcmd_arch: x64
          - platform: Linux
            runner: ubuntu-24.04
    steps:
      - name: Checkout Source
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: ${{ env.LLVM_VERSION }}
          arch: x64

      - name: Enable Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1.13.0
        if: ${{ startsWith(matrix.platform, 'Windows') }}
        with:
          arch: ${{ matrix.devcmd_arch }}

      - name: Setup Environment Variables
        if: "${{ startsWith(matrix.platform, 'Windows') }}"
        shell: bash
        run: |
          echo "CC=clang-cl" >> $GITHUB_ENV
          echo "CXX=clang-cl" >> $GITHUB_ENV
          echo "C:/Program Files/LLVM/bin" >> "$GITHUB_PATH"

      - name: Set Clang Tidy Parallelism
        shell: bash
        run: |
          jobs="$(python -c 'import os; print(max(1, (os.cpu_count() or 1) * 2))')"
          echo "CMAKE_BUILD_PARALLEL_LEVEL=$jobs" >> "$GITHUB_ENV"

      - name: Install Linux UI Dependencies
        if: "${{ matrix.platform == 'Linux' }}"
        uses: nick-fields/retry@v4.0.0
        with:
          max_attempts: 5
          timeout_minutes: 15
          retry_wait_seconds: 60
          command: |
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              libasound2-dev libpulse-dev libjack-jackd2-dev libsndio-dev \
              libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
              libxi-dev libxss-dev libxtst-dev libxkbcommon-dev \
              libdrm-dev libgbm-dev libgl1-mesa-dev libegl-dev libgles-dev \
              libdbus-1-dev libudev-dev \
              libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev

      - name: CMake Build
        run: cmake --workflow --preset=tidy

  verify-formatting:
    name: Verify Formatting
    runs-on: ubuntu-24.04
    env:
      LLVM_VERSION: 21
    steps:
      - name: Checkout Source
        uses: actions/checkout@v7

      - name: Install Clang-format
        uses: nick-fields/retry@v4.0.0
        with:
          max_attempts: 5
          timeout_minutes: 15
          retry_wait_seconds: 60
          command: |
            wget https://apt.llvm.org/llvm.sh
            chmod +x llvm.sh
            sudo ./llvm.sh ${{ env.LLVM_VERSION }}
            sudo apt install -y clang-format-${{ env.LLVM_VERSION }}

      - name: Run clang-format check
        run: |
          cd src && find . -regex '.*\.\(cpp\|hpp\|cc\|cxx\|h\|c\)' -exec clang-format-${{ env.LLVM_VERSION }} -style=file --dry-run --Werror {} +

      - name: Verify Page Formatting
        run: cd page && npx --yes prettier . --check

  build-root-tools:
    name: Build Root Tools
    runs-on: windows-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Enable Developer Command Prompt (x86)
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x86

      - name: Build 32-bit Vulkan Shim
        run: cmake --preset=release && cmake --build --preset=release -t vulkan-shim

      - name: Stash 32-bit Vulkan Shim
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path shims -Force | Out-Null
          Copy-Item build/release/artifacts/vulkan-shim.dll shims/vulkan-shim-x86.dll -Force
          Remove-Item build/release -Recurse -Force

      - name: Enable Developer Command Prompt (x64)
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x64

      - name: Build API Set Dumper and 64-bit Vulkan Shim
        run: cmake --preset=release && cmake --build --preset=release -t dump-apiset vulkan-shim

      - name: Stage Vulkan Shims
        shell: pwsh
        run: |
          Move-Item build/release/artifacts/vulkan-shim.dll build/release/artifacts/vulkan-shim-x64.dll -Force
          Copy-Item shims/vulkan-shim-x86.dll build/release/artifacts/vulkan-shim-x86.dll -Force

      - name: Upload Artifacts
        uses: pyTooling/upload-artifact@v7
        with:
          name: Temp Root Build Tools
          working-directory: build/release/artifacts/
          path: "*"
          retention-days: 1

  create-emulation-root:
    name: Create Emulation Root
    runs-on: ${{ matrix.runner }}
    needs: [build-root-tools]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - Windows 2025
          - Windows 2022
          #- Windows 2019
        include:
          - platform: Windows 2025
            runner: windows-2025
          - platform: Windows 2022
            runner: windows-2022
          #- platform: Windows 2019
          #  runner: windows-2019
    steps:
      - name: Checkout Source
        uses: actions/checkout@v7

      - name: Download DirectX Runtime
        run: curl --connect-timeout 20 --max-time 200 --retry 5 --retry-delay 2 --retry-max-time 200 -L -o directx_Jun2010_redist.exe https://download.microsoft.com/download/8/4/A/84A35BF1-DAFE-4AE8-82AF-AD2AE20B6B14/directx_Jun2010_redist.exe

      - name: Extract DirectX Runtime
        run: 'cmd /c "start /wait directx_Jun2010_redist.exe /Q /T:${{github.workspace}}/dxrt"'

      - name: Install DirectX Runtime
        run: "cmd /c \"start /wait .\\dxrt\\dxsetup.exe /silent\""

      - name: Download Root Build Tools
        uses: pyTooling/download-artifact@v8
        with:
          name: Temp Root Build Tools
          path: build/release/artifacts

      - name: Create Emulation Root
        run: src/tools/create-root.bat

      - name: Dump API Set
        run: cd root && ../build/release/artifacts/dump-apiset.exe

      - name: Install DXVK and Vulkan Shim
        shell: pwsh
        run: ./src/tools/install-gpu-runtime.ps1 -WindowsDir root/filesys/c/windows -Shim64 build/release/artifacts/vulkan-shim-x64.dll -Shim32 build/release/artifacts/vulkan-shim-x86.dll
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Upload Artifacts
        uses: pyTooling/upload-artifact@v7
        with:
          name: ${{ matrix.platform }} Emulation Root
          path: "*"
          working-directory: root
          retention-days: 1

  build:
    name: Build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - Windows x86
          - Windows x86_64
          - MinGW x86_64
          - Linux x86_64 GCC
          - Linux x86_64 GCC Sanitizer
          - Linux x86_64 Clang
          - macOS arm64
          - macOS x86_64
          - iOS arm64
          - Android x86_64
          - Android arm64-v8a
          - Emscripten Web
          - Emscripten Web Memory 64
          - Emscripten Node.js
        configuration:
          #- Debug
          - Release
        include:
          #- configuration: Debug
          #  preset: debug
          - configuration: Release
            preset: release
          - platform: Windows x86
            runner: windows-latest
            devcmd_arch: x86
          - platform: Windows x86_64
            runner: windows-latest
            devcmd_arch: x64
          - platform: MinGW x86_64
            runner: ubuntu-24.04
            rust-target: x86_64-pc-windows-gnu
            cmake-options: "-DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/cmake/toolchain/mingw-w64.cmake"
          - platform: Linux x86_64 GCC Sanitizer
            runner: ubuntu-24.04
            cmake-options: "-DSOGEN_ENABLE_SANITIZER=On"
          - platform: Linux x86_64 GCC
            runner: ubuntu-24.04
          - platform: Linux x86_64 Clang
            runner: ubuntu-24.04
            clang-version: 21
          - platform: iOS arm64
            runner: macos-latest
            rust-target: aarch64-apple-ios
            cmake-options: "-DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/cmake/toolchain/ios.cmake"
          - platform: macOS arm64
            runner: macos-latest
          - platform: macOS x86_64
            runner: macos-15-intel
          - platform: Android x86_64
            runner: ubuntu-24.04
            abi: x86_64
            rust-target: x86_64-linux-android
            cmake-options: "-DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/cmake/toolchain/android-ndk.cmake"
          - platform: Android arm64-v8a
            runner: ubuntu-24.04
            abi: arm64-v8a
            rust-target: aarch64-linux-android
            cmake-options: "-DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/cmake/toolchain/android-ndk.cmake"
          - platform: Emscripten Web
            runner: ubuntu-24.04
            cmake-options: "-DSOGEN_ENABLE_RUST_CODE=Off -DCMAKE_TOOLCHAIN_FILE=$(dirname $(which emcc))/cmake/Modules/Platform/Emscripten.cmake"
          - platform: Emscripten Web Memory 64
            runner: ubuntu-24.04
            cmake-options: "-DSOGEN_ENABLE_RUST_CODE=Off -DSOGEN_EMSCRIPTEN_MEMORY64=On -DCMAKE_TOOLCHAIN_FILE=$(dirname $(which emcc))/cmake/Modules/Platform/Emscripten.cmake"
          - platform: Emscripten Node.js
            runner: ubuntu-24.04
            cmake-options: "-DSOGEN_EMSCRIPTEN_SUPPORT_NODEJS=On -DSOGEN_ENABLE_RUST_CODE=Off -DCMAKE_TOOLCHAIN_FILE=$(dirname $(which emcc))/cmake/Modules/Platform/Emscripten.cmake"
    steps:
      - name: Checkout Source
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Configure fast APT mirror
        uses: vegardit/fast-apt-mirror.sh@1.4.5
        if: "${{ startsWith(matrix.platform, 'MinGW') }}"
        with:
          exclude-current: true

      - name: Install Rust Target
        if: "${{ matrix.rust-target }}"
        run: rustup target add ${{ matrix.rust-target }}

      - name: Install Emscripten
        if: "${{ startsWith(matrix.platform, 'Emscripten') }}"
        uses: mymindstorm/setup-emsdk@v16

      - name: Install Clang
        uses: nick-fields/retry@v4.0.0
        if: "${{ matrix.platform == 'Linux x86_64 Clang' }}"
        with:
          max_attempts: 5
          timeout_minutes: 15
          retry_wait_seconds: 60
          command: |
            wget https://apt.llvm.org/llvm.sh
            chmod +x llvm.sh
            sudo ./llvm.sh ${{ matrix.clang-version }}
            sudo apt install -y clang-${{ matrix.clang-version }} lld-${{ matrix.clang-version }}
            sudo update-alternatives --install /usr/bin/cc cc /usr/bin/clang-${{ matrix.clang-version }} 100
            sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/clang++-${{ matrix.clang-version }} 100
            sudo update-alternatives --set cc /usr/bin/clang-${{ matrix.clang-version }}
            sudo update-alternatives --set c++ /usr/bin/clang++-${{ matrix.clang-version }}

      - name: Set up MinGW
        uses: egor-tensin/setup-mingw@v3
        if: "${{ startsWith(matrix.platform, 'MinGW') }}"
        with:
          platform: x64

      - name: Enable Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1.13.0
        if: ${{ startsWith(matrix.platform, 'Windows') }}
        with:
          arch: ${{ matrix.devcmd_arch }}

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        if: ${{ startsWith(matrix.platform, 'Android') }}
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Setup Android Environment Variables
        shell: bash
        if: ${{ startsWith(matrix.platform, 'Android') }}
        run: |
          echo "ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV
          echo "ANDROID_ABI=${{ matrix.abi }}" >> $GITHUB_ENV

      - name: Install Linux UI Dependencies
        if: "${{ contains(matrix.platform, 'Linux x86_64') }}"
        uses: nick-fields/retry@v4.0.0
        with:
          max_attempts: 5
          timeout_minutes: 15
          retry_wait_seconds: 60
          command: |
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              libasound2-dev libpulse-dev libjack-jackd2-dev libsndio-dev \
              libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
              libxi-dev libxss-dev libxtst-dev libxkbcommon-dev \
              libdrm-dev libgbm-dev libgl1-mesa-dev libegl-dev libgles-dev \
              libdbus-1-dev libudev-dev \
              libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev

      - name: CMake Build
        run: cmake --preset=${{matrix.preset}} ${{matrix.cmake-options}} && cmake --build --preset=${{matrix.preset}}

      - name: Upload Artifacts
        uses: pyTooling/upload-artifact@v7
        with:
          name: ${{ matrix.platform }} ${{matrix.configuration}} Artifacts
          working-directory: build/${{matrix.preset}}/artifacts/
          path: "*"
          retention-days: 1

      - name: Upload Test Configuration
        uses: actions/upload-artifact@v7
        with:
          name: Temp ${{ matrix.platform }} ${{matrix.configuration}} Test Config
          path: "build/${{matrix.preset}}/**/CTestTestfile.cmake"
          retention-days: 1

  # Release is the same as Release from build step
  # However, that way the win tests can start without
  # waiting for other platforms
  build-isolate:
    name: Build Isolate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - Windows x86_64
        configuration:
          - Debug
          - Release
        include:
          - configuration: Debug
            preset: debug
          - configuration: Release
            preset: release
          - platform: Windows x86_64
            runner: windows-latest
            devcmd_arch: x64
            cmake-options: "-DSOGEN_ENABLE_LTO=Off"
    steps:
      - name: Checkout Source
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Enable Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1.13.0
        if: ${{ startsWith(matrix.platform, 'Windows') }}
        with:
          arch: ${{ matrix.devcmd_arch }}

      - name: CMake Build
        run: cmake --preset=${{matrix.preset}} ${{matrix.cmake-options}} && cmake --build --preset=${{matrix.preset}}

      - name: Upload Artifacts
        uses: pyTooling/upload-artifact@v7
        with:
          name: Temp Isolate ${{ matrix.platform }} ${{matrix.configuration}} Artifacts
          working-directory: build/${{matrix.preset}}/artifacts/
          path: "*"
          retention-days: 1

      - name: Upload Test Configuration
        uses: actions/upload-artifact@v7
        with:
          name: Temp Isolate ${{ matrix.platform }} ${{matrix.configuration}} Test Config
          path: "build/${{matrix.preset}}/**/CTestTestfile.cmake"
          retention-days: 1

  test:
    name: Test
    runs-on: ${{ matrix.runner }}
    needs: [create-emulation-root, build]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - Windows x86
          - Windows x86_64
          - Linux x86_64 GCC
          - Linux x86_64 GCC Sanitizer
          - Linux x86_64 Clang
          - macOS arm64
          - macOS x86_64
        emulator:
          - Unicorn
          - Icicle
        emulation-root:
          #- Windows 2025
          - Windows 2022
          #- Windows 2019
        configuration:
          #- Debug
          - Release
        include:
          #- configuration: Debug
          #  preset: debug
          - configuration: Release
            preset: release
          - platform: Windows x86
            runner: windows-latest
          - platform: Windows x86_64
            runner: windows-latest
          - platform: Linux x86_64 GCC
            runner: ubuntu-24.04
          - platform: Linux x86_64 GCC Sanitizer
            runner: ubuntu-24.04
          - platform: Linux x86_64 Clang
            runner: ubuntu-24.04
          - platform: macOS arm64
            runner: macos-latest
          - platform: macOS x86_64
            runner: macos-15-intel
    steps:
      - name: Checkout Source
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Environment Variables
        shell: bash
        run: |
          echo "RUST_BACKTRACE=1" >> $GITHUB_ENV
          echo "ASAN_OPTIONS=detect_odr_violation=0" >> $GITHUB_ENV
          echo "EMULATOR_ICICLE=${{ matrix.emulator == 'Icicle' }}" >> $GITHUB_ENV

      - name: Download Test Configuration
        uses: actions/download-artifact@v8
        with:
          name: Temp ${{ matrix.platform }} ${{matrix.configuration}} Test Config
          path: build/${{matrix.preset}}

      - name: Download Artifacts
        uses: pyTooling/download-artifact@v8
        with:
          name: ${{ matrix.platform }} ${{matrix.configuration}} Artifacts
          path: build/${{matrix.preset}}/artifacts

      - name: Download Windows Artifacts
        uses: pyTooling/download-artifact@v8
        if: "${{ matrix.platform != 'Windows x86_64' }}"
        with:
          name: Windows x86_64 Release Artifacts
          path: build/${{matrix.preset}}/artifacts

      - name: Download Emulation Root
        uses: pyTooling/download-artifact@v8
        with:
          name: ${{ matrix.emulation-root }} Emulation Root
          path: build/${{matrix.preset}}/artifacts/root

      - name: Copy Test Sample
        run: cp build/${{matrix.preset}}/artifacts/test-sample.exe build/${{matrix.preset}}/artifacts/root/filesys/c/

      - name: CMake Test
        if: ${{ matrix.emulator != 'Icicle' || matrix.platform != 'Windows x86' }}
        run: cd build/${{matrix.preset}} && ctest --verbose -j
        env:
          EMULATOR_ROOT: ${{github.workspace}}/build/${{matrix.preset}}/artifacts/root
          EMULATOR_VERBOSE: ${{ inputs.verbose }}
          ANALYSIS_SAMPLE: ${{github.workspace}}/build/${{matrix.preset}}/artifacts/test-sample.exe
          LINUX_TEST_ROOT: ${{github.workspace}}/deps/sogen-linux-files/test/linux

  win-test:
    name: Windows Test
    runs-on: windows-latest
    needs: [create-emulation-root, build-isolate]
    strategy:
      fail-fast: false
      matrix:
        configuration:
          - Debug
          - Release
        emulator:
          - Unicorn
          - Icicle
          #- WHP
        emulation-root:
          - Windows 2025
          - Windows 2022
          #- Windows 2019
        include:
          - configuration: Debug
            preset: debug
          - configuration: Release
            preset: release
    steps:
      - name: Checkout Source
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Environment Variables
        shell: bash
        run: |
          echo "RUST_BACKTRACE=1" >> $GITHUB_ENV
          echo "ASAN_OPTIONS=detect_odr_violation=0" >> $GITHUB_ENV
          echo "EMULATOR_ICICLE=${{ matrix.emulator == 'Icicle' }}" >> $GITHUB_ENV
          echo "EMULATOR_WHP=${{ matrix.emulator == 'WHP' }}" >> $GITHUB_ENV

      - name: Download Test Configuration
        uses: actions/download-artifact@v8
        with:
          name: Temp Isolate Windows x86_64 ${{ matrix.configuration}} Test Config
          path: build/${{ matrix.preset }}

      - name: Download Artifacts
        uses: pyTooling/download-artifact@v8
        with:
          name: Temp Isolate Windows x86_64 ${{ matrix.configuration}} Artifacts
          path: build/${{ matrix.preset }}/artifacts

      - name: Download Emulation Root
        uses: pyTooling/download-artifact@v8
        with:
          name: ${{ matrix.emulation-root }} Emulation Root
          path: build/${{ matrix.preset }}/artifacts/root

      - name: Copy Test Sample
        run: cp build/${{ matrix.preset }}/artifacts/test-sample.exe build/${{ matrix.preset }}/artifacts/root/filesys/c/

      - name: CMake Test
        run: cd build/${{ matrix.preset }} && ctest --verbose -j
        env:
          EMULATOR_ROOT: ${{github.workspace}}/build/${{ matrix.preset }}/artifacts/root
          EMULATOR_VERBOSE: ${{ inputs.verbose }}
          ANALYSIS_SAMPLE: ${{github.workspace}}/build/${{ matrix.preset }}/artifacts/test-sample.exe

  smoke-test-node:
    name: Smoke Test Node.js
    runs-on: ubuntu-24.04
    needs: [create-emulation-root, build]
    steps:
      - name: Download Artifacts
        uses: pyTooling/download-artifact@v8
        with:
          name: Emscripten Node.js Release Artifacts
          path: build/release/artifacts

      - name: Download Windows Artifacts
        uses: pyTooling/download-artifact@v8
        with:
          name: Windows x86_64 Release Artifacts
          path: build/release/artifacts

      - name: Download Emulation Root
        uses: pyTooling/download-artifact@v8
        with:
          name: Windows 2022 Emulation Root
          path: build/release/artifacts/root

      - name: Copy Test Sample
        run: cp build/release/artifacts/test-sample.exe build/release/artifacts/root/filesys/c/

      - name: CMake Test
        run: cd build/release/artifacts && node ./windows-emulator-test.js
        env:
          EMULATOR_ROOT: ${{github.workspace}}/build/release/artifacts/root
          EMULATOR_VERBOSE: ${{ inputs.verbose }}

  smoke-test-whp:
    name: Smoke Test WHP x86_64
    runs-on: windows-latest
    needs: [create-emulation-root, build]
    steps:
      - name: Download Artifacts
        uses: pyTooling/download-artifact@v8
        with:
          name: Windows x86_64 Release Artifacts
          path: build/release/artifacts

      - name: Download Emulation Root
        uses: pyTooling/download-artifact@v8
        with:
          name: Windows 2022 Emulation Root
          path: build/release/artifacts/root

      - name: Copy Test Sample
        run: cp build/release/artifacts/test-sample.exe build/release/artifacts/root/filesys/c/

      - name: Print WHP Diagnostics
        shell: powershell
        run: |
          $cpu = Get-CimInstance Win32_Processor | Select-Object -First 1
          $cs = Get-CimInstance Win32_ComputerSystem
          $os = Get-CimInstance Win32_OperatingSystem

          Write-Host "WHP diagnostics"
          Write-Host "  CPU Name: $($cpu.Name)"
          Write-Host "  CPU Manufacturer: $($cpu.Manufacturer)"
          Write-Host "  CPU Description: $($cpu.Description)"
          Write-Host "  CPU Architecture: $($cpu.Architecture)"
          Write-Host "  Logical Processors: $($cpu.NumberOfLogicalProcessors)"
          Write-Host "  Address Width: $($cpu.AddressWidth)"
          Write-Host "  Data Width: $($cpu.DataWidth)"
          Write-Host "  Hypervisor Present: $($cs.HypervisorPresent)"
          Write-Host "  System Model: $($cs.Model)"
          Write-Host "  System Manufacturer: $($cs.Manufacturer)"
          Write-Host "  OS Version: $($os.Caption) $($os.Version)"
          systeminfo | Select-String -Pattern 'Hyper-V Requirements|Virtualization Enabled In Firmware|VM Monitor Mode Extensions|Second Level Address Translation|Data Execution Prevention'

      - name: CMake Test
        run: cd build/release/artifacts && ./analyzer.exe -e root c:/test-sample.exe
        env:
          EMULATOR_WHP: "1"
          EMULATOR_ROOT: ${{github.workspace}}/build/release/artifacts/root
          EMULATOR_VERBOSE: ${{ inputs.verbose }}

  smoke-test-kvm:
    name: Smoke Test KVM x86_64
    runs-on: ubuntu-24.04
    needs: [create-emulation-root, build]
    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download Artifacts
        uses: pyTooling/download-artifact@v8
        with:
          name: Linux x86_64 GCC Release Artifacts
          path: build/release/artifacts

      - name: Download Windows Artifacts
        uses: pyTooling/download-artifact@v8
        with:
          name: Windows x86_64 Release Artifacts
          path: build/release/artifacts

      - name: Download Emulation Root
        uses: pyTooling/download-artifact@v8
        with:
          name: Windows 2022 Emulation Root
          path: build/release/artifacts/root

      - name: Copy Test Sample
        run: cp build/release/artifacts/test-sample.exe build/release/artifacts/root/filesys/c/

      - name: Print KVM Diagnostics
        run: |
          echo "KVM diagnostics"
          ls -l /dev/kvm || true
          lscpu | grep -iE 'Virtualization|Hypervisor|Model name' || true
          grep -m1 -oE 'vmx|svm' /proc/cpuinfo || true

      - name: CMake Test
        run: cd build/release/artifacts && chmod +x ./analyzer && ./analyzer -e root c:/test-sample.exe
        env:
          EMULATOR_KVM: "1"
          EMULATOR_ROOT: ${{github.workspace}}/build/release/artifacts/root
          EMULATOR_VERBOSE: ${{ inputs.verbose }}

  smoke-test-win32:
    name: Smoke Test Windows x86
    runs-on: windows-latest
    needs: [create-emulation-root, build]
    steps:
      - name: Download Artifacts
        uses: pyTooling/download-artifact@v8
        with:
          name: Windows x86 Release Artifacts
          path: build/release/artifacts

      - name: Download Emulation Root
        uses: pyTooling/download-artifact@v8
        with:
          name: Windows 2022 Emulation Root
          path: build/release/artifacts/root

      - name: Copy Test Sample
        run: cp build/release/artifacts/test-sample.exe build/release/artifacts/root/filesys/c/

      - name: CMake Test
        run: cd build/release/artifacts && ./analyzer.exe -e root c:/test-sample.exe
        env:
          EMULATOR_ROOT: ${{github.workspace}}/build/release/artifacts/root
          EMULATOR_VERBOSE: ${{ inputs.verbose }}

  smoke-test-mingw:
    name: Smoke Test MinGW x86_64
    runs-on: windows-latest
    needs: [create-emulation-root, build]
    steps:
      - name: Download Artifacts
        uses: pyTooling/download-artifact@v8
        with:
          name: MinGW x86_64 Release Artifacts
          path: build/release/artifacts

      - name: Download Emulation Root
        uses: pyTooling/download-artifact@v8
        with:
          name: Windows 2022 Emulation Root
          path: build/release/artifacts/root

      - name: Copy Test Sample
        run: cp build/release/artifacts/test-sample.exe build/release/artifacts/root/filesys/c/

      - name: CMake Test
        run: cd build/release/artifacts && ./windows-emulator-test.exe && ./analyzer.exe -e root c:/test-sample.exe
        env:
          EMULATOR_ROOT: ${{github.workspace}}/build/release/artifacts/root
          EMULATOR_VERBOSE: ${{ inputs.verbose }}

  smoke-test-android:
    name: Smoke Test Android
    runs-on: ${{ matrix.runner }}
    needs: [create-emulation-root, build]
    strategy:
      fail-fast: false
      matrix:
        architecture:
          - x86_64
          #- arm64-v8a
        emulator:
          - Unicorn
          - Icicle
        emulation-root:
          #- Windows 2025
          - Windows 2022
          #- Windows 2019
        configuration:
          #- Debug
          - Release
        include:
          #- configuration: Debug
          #  preset: debug
          - configuration: Release
            preset: release
          - architecture: x86_64
            runner: ubuntu-24.04
          #- architecture: arm64-v8a
          #  runner: macos-latest
    steps:
      - name: Enable KVM
        if: ${{ startsWith(matrix.runner, 'ubuntu') }}
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download Artifacts
        uses: pyTooling/download-artifact@v8
        with:
          name: Android ${{matrix.architecture}} ${{matrix.configuration}} Artifacts
          path: build/${{matrix.preset}}/artifacts

      - name: Download Windows Artifacts
        uses: pyTooling/download-artifact@v8
        with:
          name: Windows x86_64 Release Artifacts
          path: build/${{matrix.preset}}/artifacts

      - name: Download Emulation Root
        uses: pyTooling/download-artifact@v8
        with:
          name: ${{ matrix.emulation-root }} Emulation Root
          path: build/${{matrix.preset}}/artifacts/root

      - name: Copy Test Sample
        run: cp build/${{matrix.preset}}/artifacts/test-sample.exe build/${{matrix.preset}}/artifacts/root/filesys/c/

      - name: Run Test
        uses: reactivecircus/android-emulator-runner@v2.37.0
        with:
          api-level: 29
          arch: ${{matrix.architecture}}
          script: |
            tar -cf build/${{matrix.preset}}/artifacts.tar -C build/${{matrix.preset}}/artifacts .
            adb push build/${{matrix.preset}}/artifacts.tar /data/local/tmp/
            adb shell "cd /data/local/tmp && tar xf artifacts.tar --no-same-owner && rm artifacts.tar && export LD_LIBRARY_PATH=. && chmod +x ./analyzer && EMULATOR_ICICLE=${{ matrix.emulator == 'Icicle' }} ./analyzer -e ./root c:/test-sample.exe"

  build-page:
    name: Build Page
    runs-on: ubuntu-latest
    needs: [create-emulation-root, build]
    steps:
      - name: Checkout Source
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Download Emscripten Web Artifacts
        uses: pyTooling/download-artifact@v8
        with:
          name: Emscripten Web Release Artifacts
          path: build/release/artifacts/32

      - name: Download Emscripten Web Memory 64 Artifacts
        uses: pyTooling/download-artifact@v8
        with:
          name: Emscripten Web Memory 64 Release Artifacts
          path: build/release/artifacts/64

      - name: Download Windows Artifacts
        uses: pyTooling/download-artifact@v8
        with:
          name: Windows x86_64 Release Artifacts
          path: build/release/artifacts

      - name: Download Emulation Root
        uses: pyTooling/download-artifact@v8
        with:
          name: Windows 2022 Emulation Root
          path: build/release/artifacts/root

      - name: Copy Sample
        run: cp ./build/release/artifacts/test-sample.exe build/release/artifacts/root/filesys/c/

      - name: Create Emulation Root zip
        run: cd ./build/release/artifacts && zip -r "${{github.workspace}}/page/public/root.zip" ./root

      - name: Create Linux Emulation Root zip
        run: cd ./deps/sogen-linux-files && zip -r "${{github.workspace}}/page/public/linux-root.zip" ./root

      - name: Copy Files
        run: |
          mkdir -p ./page/public/32/
          mkdir -p ./page/public/64/
          cp ./build/release/artifacts/32/analyzer.js ./page/public/32/
          cp ./build/release/artifacts/32/analyzer.wasm ./page/public/32/
          cp ./build/release/artifacts/64/analyzer.js ./page/public/64/
          cp ./build/release/artifacts/64/analyzer.wasm ./page/public/64/

      - name: Build Page
        run: cd ./page && npm ci && npm run build

      - name: Upload Page Artifacts
        uses: pyTooling/upload-artifact@v7
        with:
          name: Page Artifacts
          working-directory: page/dist/
          path: "*"
          retention-days: 1

  build-python-wheel:
    name: Build Python Wheel (${{ matrix.display }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            display: Linux x86_64
            artifact: linux-x86_64
          - runner: windows-latest
            display: Windows x86_64
            artifact: windows-x86_64
          - runner: macos-latest
            display: macOS arm64
            artifact: macos-arm64
            macos-deployment-target: "11.0"
          - runner: macos-15-intel
            display: macOS x86_64
            artifact: macos-x86_64
            macos-deployment-target: "10.13"
    steps:
      - name: Checkout Source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"
        env:
          PIP_NO_CACHE_DIR: 1

      - name: Install build tools
        run: python -m pip install --upgrade pip build setuptools-scm

      - name: Install Linux UI Dependencies
        if: "${{ startsWith(matrix.runner, 'ubuntu') }}"
        uses: nick-fields/retry@v4.0.0
        with:
          max_attempts: 5
          timeout_minutes: 15
          retry_wait_seconds: 60
          command: |
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              libasound2-dev libpulse-dev libjack-jackd2-dev libsndio-dev \
              libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
              libxi-dev libxss-dev libxtst-dev libxkbcommon-dev \
              libdrm-dev libgbm-dev libgl1-mesa-dev libegl-dev libgles-dev \
              libdbus-1-dev libudev-dev \
              libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev

      - name: Build wheel
        run: python -m build "${{ github.workspace }}" --wheel --outdir dist
        env:
          CMAKE_ARGS: ${{ inputs.enable_deploy && '-DSOGEN_DISABLE_NANOBIND_LEAK_WARNINGS=ON' || '' }}
          # Pin the macOS platform tag so it doesn't float with the runner OS
          # version. Without this the wheel is tagged with whatever macOS the
          # build runner happens to be on (e.g. macosx_26_0 during the
          # macos-latest migration), which the test job then can't install if it
          # lands on an older runner.
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos-deployment-target }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: sogen-wheel-${{ matrix.artifact }}
          path: dist/*.whl
          retention-days: 1

  test-python-wheel:
    name: Test Python Wheel (${{ matrix.display }})
    runs-on: ${{ matrix.runner }}
    needs: [build-python-wheel, build-isolate, create-emulation-root]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            display: Linux x86_64
            artifact: linux-x86_64
          - runner: windows-latest
            display: Windows x86_64
            artifact: windows-x86_64
          - runner: macos-latest
            display: macOS arm64
            artifact: macos-arm64
          - runner: macos-15-intel
            display: macOS x86_64
            artifact: macos-x86_64
    steps:
      - name: Checkout Source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"
        env:
          PIP_NO_CACHE_DIR: 1

      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: sogen-wheel-${{ matrix.artifact }}
          path: dist

      - name: Install wheel
        shell: bash
        run: python -m pip install --upgrade pip && python -m pip install --force-reinstall --no-deps dist/*.whl

      - name: Download Release Artifacts
        uses: pyTooling/download-artifact@v8
        with:
          name: Temp Isolate Windows x86_64 Release Artifacts
          path: build/release/artifacts

      - name: Download Emulation Root
        uses: pyTooling/download-artifact@v8
        with:
          name: Windows 2022 Emulation Root
          path: build/release/artifacts/root

      - name: Copy Test Sample
        run: cp build/release/artifacts/test-sample.exe build/release/artifacts/root/filesys/c/

      - name: Run Python Test Script
        run: python src/python-bindings/test.py
        env:
          EMULATOR_ROOT: ${{github.workspace}}/build/release/artifacts/root
          EMULATOR_VERBOSE: ${{ inputs.verbose }}
          ANALYSIS_SAMPLE: ${{github.workspace}}/build/release/artifacts/test-sample.exe

      - name: Run Python Linux Unicorn Test Script
        if: ${{ startsWith(matrix.runner, 'ubuntu') }}
        run: python src/python-bindings/test_linux.py
        env:
          LINUX_PYTHON_TEST_BINARY: /bin/true
          LINUX_PYTHON_TEST_ROOT: /
          LINUX_PYTHON_TEST_BACKEND: unicorn

      - name: Run Python Linux KVM Test Script
        if: ${{ startsWith(matrix.runner, 'ubuntu') }}
        shell: bash
        run: |
          if [ -r /dev/kvm ] && [ -w /dev/kvm ]; then
            LINUX_PYTHON_TEST_BINARY=/bin/true LINUX_PYTHON_TEST_ROOT=/ LINUX_PYTHON_TEST_BACKEND=kvm python src/python-bindings/test_linux.py
          else
            echo "Skipping KVM smoke: /dev/kvm is unavailable on this runner"
          fi

  build-python-sdist:
    name: Build Python Sdist
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"
        env:
          PIP_NO_CACHE_DIR: 1

      - name: Install build tools
        run: python -m pip install --upgrade pip build setuptools-scm

      - name: Build sdist
        run: python -m build "${{ github.workspace }}" --sdist --outdir dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: sogen-sdist
          path: dist/*.tar.gz
          retention-days: 1

  test-python-sdist:
    name: Test Python Sdist
    runs-on: ubuntu-24.04
    needs: [build-python-sdist]
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"
        env:
          PIP_NO_CACHE_DIR: 1

      - name: Download sdist artifact
        uses: actions/download-artifact@v8
        with:
          name: sogen-sdist
          path: dist

      # Intentionally NOT installing the SDL build dependencies here: this job
      # proves that a source install builds headless. pyproject.toml sets
      # SDL_UNIX_CONSOLE_BUILD=ON so the bundled SDL3 builds without X11/Wayland.
      - name: Install sdist
        run: python -m pip install --upgrade pip && python -m pip install --force-reinstall dist/*.tar.gz

      - name: Verify import
        run: |
          python - <<'PY'
          import sogen
          assert hasattr(sogen, "create_application")
          assert hasattr(sogen, "Backend")
          print("ok")
          PY

  summary:
    name: Pipeline Summary
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    needs:
      [
        build-page,
        build-python-wheel,
        test-python-wheel,
        build-python-sdist,
        test-python-sdist,
        clang-tidy,
        build-root-tools,
        smoke-test-whp,
        smoke-test-kvm,
        smoke-test-node,
        smoke-test-mingw,
        smoke-test-win32,
        smoke-test-android,
        create-emulation-root,
        build,
        build-isolate,
        test,
        win-test,
        verify-formatting,
        workflow_metadata,
      ]
    steps:
      - uses: geekyeggo/delete-artifact@v6
        continue-on-error: true
        with:
          name: "Temp *"

      - name: Pipeline failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
